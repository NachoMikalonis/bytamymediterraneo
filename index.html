<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>by Tamy Mediterráneo</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;1,400&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      background: #121212;
      color: #f2f2f2;
      font-family: 'Montserrat', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 20px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 3.5rem;
      margin-bottom: 10px;
      font-style: italic;
    }

    .subtitle {
      color: #d4af37;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: 0.8rem;
      margin-bottom: 20px;
    }

    p {
      color: #aaaaaa;
      margin-bottom: 30px;
    }

    .badge {
      border: 1px solid #d4af37;
      padding: 12px 25px;
      display: inline-block;
      color: #d4af37;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-size: 0.75rem;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>by Tamy</h1>
    <div class="subtitle">Mediterráneo</div>
    <p>Experiencias gastronómicas de autor.<br>Muy pronto podrás vivir el viaje.</p>
    <div class="badge">Sitio en construcción</div>
  </div>
</body>
</html>
